<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderyo - Itinerarios Madrid</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/logo.png">
</head>
<body>
    <header>
        <img src="assets/Logo.png" alt="Wanderyo Logo" width="120">
        <h1>Wanderyo - Itinerarios en Madrid</h1>
    </header>

    <main>
        <label for="days">Número de días:</label>
        <select id="days">
            <option value="1">1 día</option>
            <option value="2">2 días</option>
            <option value="3">3 días</option>
        </select>
        <button id="generate">Generar Itinerario</button>

        <div id="itinerary"></div>

        <div id="map" style="height: 400px; margin-top: 20px;"></div>
    </main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="script.js"></script>
</body>
</html>
